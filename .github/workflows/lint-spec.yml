name: Run Spectral on Pull Requests

on:
  - pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Install dependencies
        run: vp install

      - name: Build spec bundles
        run: vp run bundle

      - name: Run spec lint
        run: vp run lint
