name: SDK Sync

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Verify SDK release readiness
        run: vp run sdk:check:release

      - name: Clone split SDK repositories
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          GIT_USER_ID: alexasomba
        run: |
          set -euo pipefail

          if [ -z "${GIT_TOKEN:-}" ]; then
            echo "Missing GIT_TOKEN secret" >&2
            exit 1
          fi

          sdk_base="$RUNNER_TEMP/paystack-sdks/sdks"
          mkdir -p "$sdk_base"

          while IFS=$'\t' read -r sdk repo branch; do
            if [ -z "$sdk" ]; then
              continue
            fi

            git clone \
              --branch "$branch" \
              "https://x-access-token:${GIT_TOKEN}@github.com/${GIT_USER_ID}/${repo}.git" \
              "$sdk_base/$repo"
          done < <(node scripts/sdk-registry.mjs sync-plan)

          echo "LOCAL_SDK_PATH=$sdk_base" >> "$GITHUB_ENV"

      - name: Sync SDKs
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: vp run sdk:sync:all -- "Automated SDK sync from main"
