name: SDK Sync

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Verify SDK release readiness
        run: vp run sdk:check:release

      - name: Sync SDKs
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: vp run sdk:sync:all -- "Automated SDK sync from main"
