type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      id:
        type: integer
      integration:
        type: object
        properties:
          key:
            type: string
          name:
            type: string
          logo:
            type: string
          allowed_currencies:
            type: array
            items:
              type: string
        required:
          - key
          - name
          - logo
          - allowed_currencies
      domain:
        type: string
      amount:
        type: integer
      currency:
        type: string
      due_date:
        type: string
        nullable: true
      has_invoice:
        type: boolean
      invoice_number:
        type: integer
        nullable: true
      description:
        type: string
        nullable: true
      pdf_url:
        type: string
        nullable: true
      line_items:
        type: array
        items: {}
      tax:
        type: array
        items: {}
      request_code:
        type: string
      status:
        type: string
      paid:
        type: boolean
      paid_at:
        type: string
        nullable: true
      metadata:
        type: object
        nullable: true
      notifications:
        type: array
        items:
          $ref: ./PaymentRequestNotificationsArray.yaml
      offline_reference:
        type: string
      customer:
        type: object
        properties:
          id:
            type: integer
          first_name:
            type: string
          last_name:
            type: string
          email:
            type: string
          customer_code:
            type: string
          phone:
            type: string
            nullable: true
          metadata:
            type: object
            nullable: true
          risk_action:
            type: string
          international_format_phone:
            type: string
            nullable: true
        required:
          - id
          - first_name
          - last_name
          - email
          - customer_code
          - phone
          - metadata
          - risk_action
      created_at:
        type: string
      discount:
        type: object
        nullable: true
      split_code:
        type: string
        nullable: true
      pending_amount:
        type: integer
    required:
      - id
      - integration
      - domain
      - amount
      - currency
      - due_date
      - has_invoice
      - invoice_number
      - description
      - pdf_url
      - line_items
      - tax
      - request_code
      - status
      - paid
      - paid_at
      - metadata
      - notifications
      - offline_reference
      - customer
      - created_at
      - pending_amount
required:
  - status
  - message
  - data
