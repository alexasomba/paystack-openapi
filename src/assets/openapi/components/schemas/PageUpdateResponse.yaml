type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      domain:
        type: string
      name:
        type: string
      description:
        type: string
        nullable: true
      amount:
        type: integer
        nullable: true
      currency:
        type: string
      slug:
        type: string
      active:
        type: boolean
      id:
        type: integer
      integration:
        type: integer
      createdAt:
        type: string
      updatedAt:
        type: string
    required:
      - domain
      - name
      - amount
      - currency
      - slug
      - active
      - id
      - integration
      - createdAt
      - updatedAt
required:
  - status
  - message
  - data
