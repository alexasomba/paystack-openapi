type: object
properties:
  name:
    description: Name of plan
    type: string
  amount:
    description: >-
      Amount should be in the subunit of the supported currency (e.g. kobo for
      NGN, pesewas for GHS, cents for ZAR/USD/KES). For XOF, send the amount
      multiplied by 100 even though the currency does not use fractional
      subunits.
    type: integer
  interval:
    description: Payment interval
    type: string
    enum:
      - daily
      - weekly
      - monthly
      - biannually
      - annually
  description:
    description: A description for this plan
    type: string
  metadata:
    description: Stringified JSON object or JSON object of custom data
    anyOf:
      - type: string
      - type: object
      - type: integer
  send_invoices:
    description: Set to false if you don't want invoices to be sent to your customers
    type: boolean
  send_sms:
    description: Set to false if you don't want text messages to be sent to your customers
    type: boolean
  currency:
    description: Currency in which amount is set. Allowed values are NGN, GHS, ZAR, USD or XOF
    type: string
  invoice_limit:
    description: |-
      Number of invoices to raise during subscription to this plan. 
      Can be overridden by specifying an invoice_limit while subscribing.
    type: integer
example:
  name: "Starter"
