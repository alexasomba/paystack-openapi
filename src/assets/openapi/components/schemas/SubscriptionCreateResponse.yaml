type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      customer:
        type: integer
      plan:
        type: integer
      integration:
        type: integer
      domain:
        type: string
      start:
        type: integer
      status:
        type: string
      quantity:
        type: integer
      amount:
        type: integer
      authorization:
        type: object
        properties:
          authorization_code:
            type: string
          bin:
            type: string
          last4:
            type: string
          exp_month:
            type: string
          exp_year:
            type: string
          channel:
            type: string
          card_type:
            type: string
          bank:
            type: string
          country_code:
            type: string
          brand:
            type: string
          reusable:
            type: boolean
          signature:
            type: string
          account_name:
            nullable: true
      subscription_code:
        type: string
      email_token:
        type: string
      id:
        type: integer
      createdAt:
        type: string
      updatedAt:
        type: string
    required:
      - customer
      - plan
      - integration
      - domain
      - start
      - status
      - quantity
      - amount
      - authorization
      - subscription_code
      - email_token
      - id
      - createdAt
      - updatedAt
required:
  - status
  - message
  - data
