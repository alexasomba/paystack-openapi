type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      email:
        type: string
      integration:
        type: integer
      domain:
        type: string
      customer_code:
        type: string
      id:
        type: integer
      identified:
        type: boolean
      identifications:
        nullable: true
      createdAt:
        type: string
      updatedAt:
        type: string
    required:
      - email
      - integration
      - domain
      - customer_code
      - id
      - identified
      - identifications
      - createdAt
      - updatedAt
required:
  - status
  - message
  - data
