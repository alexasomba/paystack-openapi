type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      product_code:
        type: string
      price:
        type: integer
      currency:
        type: string
      quantity:
        type: integer
      quantity_sold:
        nullable: true
      type:
        type: string
      image_path:
        type: string
      file_path:
        type: string
      is_shippable:
        type: boolean
      unlimited:
        type: boolean
      domain:
        type: string
      active:
        type: boolean
      features:
        nullable: true
      in_stock:
        type: boolean
      metadata:
        nullable: true
      id:
        type: integer
      integration:
        type: integer
      createdAt:
        type: string
      updatedAt:
        type: string
    required:
      - name
      - description
      - product_code
      - price
      - currency
      - quantity
      - quantity_sold
      - type
      - image_path
      - file_path
      - is_shippable
      - unlimited
      - domain
      - active
      - features
      - in_stock
      - metadata
      - id
      - integration
      - createdAt
      - updatedAt
required:
  - status
  - message
  - data
