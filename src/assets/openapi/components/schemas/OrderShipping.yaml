type: object
description: The shipping details of the order
required:
  - street_line
  - city
  - state
  - country
  - shipping_fee
properties:
  street_line:
    description: The address of for the delivery
    type: string
  city:
    description: The city of the delivery address
    type: string
  state:
    description: The state of the delivery address
    type: string
  country:
    description: The country of the delivery address
    type: string
  shipping_fee:
    description: >
      Amount should be in the subunit of the supported currency (e.g. kobo for NGN, pesewas for GHS, cents for ZAR/USD/KES).
      For XOF, the amount is the same as the base units (not multiplied by 100).
    type: integer
  delivery_note:
    description: Extra details to be aware of for the delivery
    type: string
example:
  street_line: Somewhere on Earth
  city: Atlantic
  state: Pacific
  country: Equator
  shipping_fee: 10000
