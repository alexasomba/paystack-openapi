type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      id:
        type: integer
      domain:
        type: string
      status:
        type: string
      subscription_code:
        type: string
      email_token:
        type: string
      amount:
        type: integer
      cron_expression:
        type: string
      next_payment_date:
        type: string
      open_invoice:
        nullable: true
      createdAt:
        type: string
      integration:
        type: integer
      plan:
        type: object
        properties:
          domain:
            type: string
          id:
            type: integer
          integration:
            type: integer
          name:
            type: string
          plan_code:
            type: string
          description:
            nullable: true
          amount:
            type: integer
          interval:
            type: string
          send_invoices:
            type: boolean
          send_sms:
            type: boolean
          hosted_page:
            type: boolean
          hosted_page_url:
            nullable: true
          hosted_page_summary:
            nullable: true
          currency:
            type: string
          createdAt:
            type: string
          updatedAt:
            type: string
        required:
          - domain
          - id
          - integration
          - name
          - plan_code
          - description
          - amount
          - interval
          - send_invoices
          - send_sms
          - hosted_page
          - hosted_page_url
          - hosted_page_summary
          - currency
          - createdAt
          - updatedAt
      authorization:
        type: object
        properties:
          authorization_code:
            type: string
          bin:
            type: string
          last4:
            type: string
          exp_month:
            type: string
          exp_year:
            type: string
          channel:
            type: string
          card_type:
            type: string
          bank:
            type: string
          country_code:
            type: string
          brand:
            type: string
          reusable:
            type: boolean
          signature:
            type: string
          account_name:
            nullable: true
        required:
          - authorization_code
          - bin
          - last4
          - exp_month
          - exp_year
          - channel
          - card_type
          - bank
          - country_code
          - brand
          - reusable
          - signature
          - account_name
      customer:
        type: object
        properties:
          domain:
            type: string
          id:
            type: integer
          integration:
            type: integer
          first_name:
            type: string
          last_name:
            type: string
          email:
            type: string
          customer_code:
            type: string
          phone:
            type: string
            nullable: true
          metadata:
            type: object
          createdAt:
            type: string
          updatedAt:
            type: string
          risk_action:
            type: string
          international_format_phone:
            type: string
            nullable: true
        required:
          - domain
          - id
          - integration
          - first_name
          - last_name
          - email
          - customer_code
          - phone
          - metadata
          - createdAt
          - updatedAt
      start:
        type: integer
      quantity:
        type: integer
      invoices:
        type: array
        items: {}
    required:
      - id
      - domain
      - status
      - subscription_code
      - email_token
      - amount
      - start
      - quantity
      - cron_expression
      - next_payment_date
      - open_invoice
      - createdAt
      - integration
      - plan
      - authorization
      - customer
      - invoices
required:
  - status
  - message
  - data
