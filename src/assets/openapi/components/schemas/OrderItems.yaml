type: object
description: The collection of items that make up the order
required:
  - item
  - type
  - quantity
  - amount
properties:
  item:
    description: The product ID of the item
    type: integer
  type:
    description: The type of the item. `product` is currently the acceptable value
    type: string
  quantity:
    description: The number of items to get
    type: integer
  amount:
    description: >
      Amount should be in the subunit of the supported currency (e.g. kobo for NGN, pesewas for GHS, cents for ZAR/USD/KES).
      For XOF, the amount is the same as the base units (not multiplied by 100).
    type: integer
example:
  item: 2179824
  type: product
  quantity: 200000
  amount: 2
