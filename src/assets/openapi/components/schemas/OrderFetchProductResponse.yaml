type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: array
    items:
      $ref: ./OrderFetchProductResponseArray.yaml
  meta:
    allOf:
      - $ref: ./Meta.yaml
      - type: object
        properties:
          quantity_sold:
            type: integer
          revenue:
            type: integer
        required:
          - quantity_sold
          - revenue
required:
  - status
  - message
  - data
  - meta
