type: object
required:
  - name
  - destinations
properties:
  name:
    type: string
    description: Name of the Virtual Terminal
  destinations:
    type: array
    description: >-
      An array of objects containing the notification recipients for payments to
      the Virtual Terminal. Each object includes a target parameter for the
      Whatsapp phone number to send notifications to, and a name parameter for
      a descriptive label.
    items:
      type: object
      properties:
        target:
          type: string
          description: The Whatsapp phone number to send notifications to
        name:
          type: string
          description: A descriptive label for the destination
  metadata:
    type: object
    description: Stringified JSON object of custom data. Kindly check the Metadata page for more information
  currency:
    type: string
    description: The transaction currency for the Virtual Terminal. Defaults to your integration currency
  custom_fields:
    type: array
    description: >-
      An array of objects representing custom fields to display on the form.
      Each object contains a display_name parameter, representing what will be
      displayed on the Virtual Terminal page, and variable_name parameter for
      referencing the custom field programmatically
    items:
      type: object
      properties:
        display_name:
          type: string
        variable_name:
          type: string
example:
  name: Sample Terminal
  destinations:
    - target: "+2548012345678"
      name: John Doe
    - target: "+2548098765432"
      name: Jane Smith
