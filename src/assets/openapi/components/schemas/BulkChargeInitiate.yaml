type: object
description: A list of charge object
required:
  - authorization
  - amount
properties:
  authorization:
    description: Customer's card authorization code
    type: string
  amount:
    description: >
      Amount should be in the subunit of the supported currency (e.g. kobo for NGN, pesewas for GHS, cents for ZAR/USD/KES).
      For XOF, the amount is the same as the base units (not multiplied by 100).
    type: integer
  reference:
    description: |
      A unique identifier containing lowercase letters `(a-z)`, digits `(0-9)` and these symbols: dash (`-`), underscore(`_`)
    type: string
  attempt_partial_debit:
    description: >-
      A flag to indicate if you want us to try recouping lower amounts when the
      customer has insufficient fund
    type: boolean
  at_least:
    description: >
      Amount should be in the subunit of the supported currency (e.g. kobo for NGN, pesewas for GHS, cents for ZAR/USD/KES).
      For XOF, the amount is the same as the base units (not multiplied by 100).

      Minimum amount to charge if the attempt_partial_debit flag is set.
    type: integer
  metadata:
    description: JSON object of custom data
    type: object
example:
  authorization: "AUTH_ncx8hews93"
  amount: 250000
  reference: "dam1266638dhhd"
