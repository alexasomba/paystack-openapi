type: object
properties:
  status:
    type: boolean
  message:
    type: string
  data:
    type: object
    properties:
      id:
        type: integer
      code:
        type: string
      amount:
        type: integer
      currency:
        type: string
      status:
        type: string
      customer:
        type: object
        properties:
          id:
            type: integer
          email:
            type: string
        required:
          - id
          - email
      line_items:
        type: array
        items:
          type: object
          properties:
            product:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
              required:
                - id
                - name
            quantity:
              type: integer
            amount:
              type: integer
          required:
            - product
            - quantity
            - amount
      createdAt:
        type: string
    required:
      - id
      - code
      - amount
      - currency
      - status
      - customer
      - line_items
      - createdAt
required:
  - status
  - message
  - data
