post:
  tags:
    - Transfer Recipient
  summary: Create Transfer Recipient
  description: Creates a new recipient. A duplicate account number will lead to the retrieval of the existing record.
  operationId: transferrecipient_create
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TransferRecipientCreate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/TransferRecipientCreate.yaml
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransferRecipientCreateResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Transfer Recipient
  summary: List Transfer Recipients
  description: List transfer recipients available on your integration
  operationId: transferrecipient_list
  parameters:
    - in: query
      name: perPage
      schema:
        type: integer
      description: Specify how many records you want to retrieve per page. If not specified, we use a default value of 50.
    - in: query
      name: page
      schema:
        type: integer
      description: Specify exactly what page you want to retrieve. If not specified, we use a default value of 1.
    - in: query
      name: from
      description: A timestamp from which to start listing transfer recipients e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: to
      description: A timestamp at which to stop listing transfer recipients e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransferRecipientListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
