post:
  tags:
    - Transfer
  summary: Initiate Transfer
  description: Send money to your customers
  operationId: transfer_initiate
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TransferInitiate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/TransferInitiate.yaml
  responses:
    "200":
      description: "Successful operation"
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransferCreateResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Transfer
  summary: List Transfers
  description: List the transfers made on your integration
  operationId: transfer_list
  parameters:
    - in: query
      name: perPage
      schema:
        type: integer
      description: Specify how many records you want to retrieve per page. If not specify we use a default value of 50.
    - in: query
      name: page
      schema:
        type: integer
      description: Specify exactly what transfer you want to page. If not specify we use a default value of 1.
    - in: query
      name: from
      description: A timestamp from which to start listing transfer e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: to
      description: A timestamp at which to stop listing transfer e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: recipient
      description: Filter by the recipient ID
      schema:
        type: integer
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransferListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
