post:
  tags:
    - Virtual Terminal
  summary: Create Virtual Terminal
  description: Create a Virtual Terminal on your integration
  operationId: virtualTerminal_create
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VirtualTerminalCreate.yaml
  responses:
    "200":
      $ref: ../components/responses/VirtualTerminalCreateSuccess.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Virtual Terminal
  summary: List Virtual Terminals
  description: List Virtual Terminals on your integration
  operationId: virtualTerminal_list
  parameters:
    - name: status
      in: query
      description: Filter by status ('active' or 'inactive')
      schema:
        type: string
        enum:
          - active
          - inactive
    - name: perPage
      in: query
      description: Number of records per page
      schema:
        type: integer
      example: 50
    - name: search
      in: query
      description: Search query string
      schema:
        type: string
    - name: next
      in: query
      description: Cursor for next page
      schema:
        type: string
    - name: previous
      in: query
      description: Cursor for previous page
      schema:
        type: string
  responses:
    "200":
      $ref: ../components/responses/VirtualTerminalListSuccess.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
