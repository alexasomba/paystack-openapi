post:
  tags:
    - Charge
  summary: Submit Address
  operationId: charge_submitAddress
  description: Send the details of the customer's address for address verification
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChargeSubmitAddress.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ChargeSubmitAddress.yaml
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChargeCheckPendingResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
