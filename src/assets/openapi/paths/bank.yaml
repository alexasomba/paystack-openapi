get:
  tags:
    - Bank
  summary: List Banks
  description: Get a list of all supported banks and their properties
  operationId: bank_list
  parameters:
    - in: query
      name: country
      description: >-
        The country from which to obtain the list of supported banks. Accepted
        values are: ghana, kenya, nigeria, south africa
      schema:
        type: string
        enum:
          - ghana
          - kenya
          - nigeria
          - south africa
      example: nigeria
    - in: query
      name: currency
      description: One of the supported currency
      schema:
        type: string
        enum:
          - GHS
          - KES
          - NGN
          - ZAR
      example: NGN
    - in: query
      name: use_cursor
      description: A flag to indicate if cursor based pagination should be used
      schema:
        type: boolean
    - in: query
      name: perPage
      description: The number of objects to return per page. Defaults to 50, and limited to 100 records per page.
      schema:
        type: integer
    - name: page
      in: query
      description: Specify exactly what page you want to retrieve. If not specified, we use a default value of 1.
      schema:
        type: integer
    - in: query
      name: next
      description: |
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the next set of data
      schema:
        type: string
    - in: query
      name: previous
      description: |
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the previous set of data
      schema:
        type: string
    - in: query
      name: pay_with_bank_transfer
      description: A flag to filter for available banks a customer can make a transfer to complete a payment
      schema:
        type: boolean
    - in: query
      name: pay_with_bank
      description: A flag to filter for banks a customer can pay directly from
      schema:
        type: boolean
    - in: query
      name: enabled_for_verification
      description: |
        A flag to filter the banks that are supported for account verification in South Africa.
        You need to combine this with either the `currency` or `country` filter.
      schema:
        type: boolean
    - in: query
      name: gateway
      description: The gateway type of the bank
      schema:
        type: string
        enum:
          - emandate
          - digitalbankmandate
    - in: query
      name: type
      description: >-
        Type of financial channel. For Ghanaian channels, please use either
        mobile_money for mobile money channels OR ghipss for bank channels
      schema:
        type: string
        enum:
          - ghipss
          - mobile_money
          - nuban
          - kepss
          - basa
    - in: query
      name: include_nip_sort_code
      description: |
        A flag that returns Nigerian banks with their NIP institution code. 
        The returned value can be used in identifying institutions on NIP.
      schema:
        type: boolean
  responses:
    "200":
      $ref: ../components/responses/MiscellaneousListBanksSuccess.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
