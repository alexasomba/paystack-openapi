get:
  tags:
    - Settlement
  summary: Fetch Settlement Transactions
  description: Get the transactions that make up a particular settlement
  operationId: settlements_transaction
  parameters:
    - name: id
      description: The settlement ID in which you want to fetch its transactions
      in: path
      required: true
      schema:
        type: integer
      example: 8610870
    - name: perPage
      description: Number of records to fetch per page
      in: query
      schema:
        type: integer
      example: 50
    - name: page
      description: The section to retrieve
      in: query
      schema:
        type: integer
      example: 2
    - name: from
      description: The start date
      in: query
      schema:
        type: string
        format: date-time
    - name: to
      description: The end date
      in: query
      schema:
        type: string
        format: date-time
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SettlementTransactionsResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
