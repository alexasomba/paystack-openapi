get:
  tags:
    - Transaction
  summary: List Transactions
  operationId: transaction_list
  description: List transactions carried out on your integration
  parameters:
    - in: query
      name: use_cursor
      description: A flag to indicate if cursor based pagination should be used
      schema:
        type: boolean
      example: true
    - in: query
      name: next
      description: >
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the next set of data
      schema:
        type: string
    - in: query
      name: previous
      description: >
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the previous set of data
      schema:
        type: string
    - in: query
      name: perPage
      schema:
        type: integer
      description: Specify how many records you want to retrieve per page. If not specified, we use a default value of 50.
    - in: query
      name: page
      schema:
        type: integer
      description: Specify exactly what page you want to retrieve. If not specified, we use a default value of 1.
    - in: query
      name: from
      description: A timestamp from which to start listing transaction e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: to
      description: A timestamp at which to stop listing transaction e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: status
      description: Filter transaction by status
      schema:
        type: string
        enum:
          - success
          - failed
          - abandoned
          - reversed
    - in: query
      name: source
      description: The origin of the payment
      schema:
        type: string
        enum:
          - merchantApi
          - checkout
          - pos
          - virtualTerminal
    - in: query
      name: terminalid
      description: The Terminal ID for the transactions you want to retrieve
      schema:
        type: string
    - in: query
      name: virtual_account_number
      description: Filter transactions by a virtual account number
      schema:
        type: string
    - in: query
      name: customer
      description: Specify an ID for the customer whose transactions you want to retrieve
      schema:
        type: integer
    - in: query
      name: amount
      description: >
        Amount should be in the subunit of the supported currency (e.g. kobo for NGN, pesewas for GHS, cents for ZAR/USD/KES).
        For XOF, the amount is the same as the base units (not multiplied by 100).

        Filter transactions by a specific amount.
      schema:
        type: integer
        format: int64
    - in: query
      name: settlement
      description: The settlement ID to filter for settled transactions
      schema:
        type: integer
        format: int64
    - in: query
      name: channel
      description: The payment method the customer used to complete the transaction
      schema:
        type: string
        enum:
          - card
          - pos
          - bank
          - dedicated_nuban
          - ussd
          - bank_transfer
    - in: query
      name: subaccount_code
      description: Filter transaction by subaccount code
      schema:
        type: string
    - in: query
      name: split_code
      description: Filter transaction by split code
      schema:
        type: string
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransactionListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
