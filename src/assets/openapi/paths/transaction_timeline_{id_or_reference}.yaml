get:
  tags:
    - Transaction
  summary: Fetch Transaction Timeline
  operationId: transaction_timeline
  description: >-
    Fetch the steps taken from the initiation to the completion of a transaction
  parameters:
    - name: id_or_reference
      in: path
      required: true
      description: The ID or the reference of the transaction
      schema:
        type: string
      example: "3936799950"
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TransactionTimelineResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
