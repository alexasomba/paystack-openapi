post:
  tags:
    - Card Preauthorization
  summary: Capture Preauthorization
  description: Charge a preauthorized transaction upon service delivery
  operationId: preauthorization_capture
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PreAuthorizationCapture.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PreAuthorizationCapture.yaml
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PreAuthorizationCaptureResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
