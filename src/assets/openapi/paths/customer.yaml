post:
  tags:
    - Customer
  summary: Create Customer
  operationId: customer_create
  description: Create a customer on your integration
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CustomerCreate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CustomerCreate.yaml
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CustomerCreateResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Customer
  summary: List Customers
  operationId: customer_list
  description: List customers available on your integration
  parameters:
    - name: use_cursor
      description: A flag to indicate if cursor based pagination should be used
      in: query
      schema:
        type: boolean
    - name: next
      description: >
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the next set of data
      in: query
      schema:
        type: string
    - name: previous
      description: >
        An alphanumeric value returned for every cursor based retrieval, used to
        retrieve the previous set of data
      in: query
      schema:
        type: string
    - name: from
      description: A timestamp from which to start listing customers e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      in: query
      schema:
        type: string
        format: date-time
    - name: to
      description: A timestamp at which to stop listing customers e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      in: query
      schema:
        type: string
        format: date-time
    - name: perPage
      description: Specify how many records you want to retrieve per page. If not specified, we use a default value of 50.
      in: query
      schema:
        type: integer
    - name: page
      in: query
      description: Specify exactly what page you want to retrieve. If not specified, we use a default value of 1.
      schema:
        type: integer
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CustomerListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
