post:
  tags:
    - Capitec Pay
  summary: Requery Transaction
  description: >-
    Check the status of a charge made with Capitec Pay. This endpoint should be
    used from your frontend application as it requires the use of your public
    key for request authorization.
  operationId: capitecPay_requery
  parameters:
    - name: ref
      in: path
      description: The transaction reference from the previously initiated charge request
      required: true
      schema:
        type: string
      example: "123456789"
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CapitecPayRequeryResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
