post:
  tags:
    - Split
  summary: Create Split
  operationId: split_create
  description: Create a split configuration for transactions
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SplitCreate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/SplitCreate.yaml
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SplitCreateResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Split
  summary: List Splits
  operationId: split_list
  description: List the transaction splits available on your integration
  parameters:
    - in: query
      name: subaccount_code
      description: Filter by subaccount code
      schema:
        type: string
      example: ACCT_dskvlw3y3dMukmt
    - name: name
      description: The name of the split
      in: query
      schema:
        type: string
    - name: active
      description: The status of the split
      in: query
      schema:
        type: boolean
    - name: sort_by
      description: Sort by name, defaults to createdAt date
      in: query
      schema:
        type: string
    - in: query
      name: perPage
      schema:
        type: integer
      description: Number of splits per page. If not specified, we use a default value of 50.
    - in: query
      name: page
      schema:
        type: integer
      description: Page number to view. If not specified, we use a default value of 1.
    - in: query
      name: from
      description: A timestamp from which to start listing splits e.g. 2019-09-24T00:00:05.000Z, 2019-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: to
      description: A timestamp at which to stop listing splits e.g. 2019-09-24T00:00:05.000Z, 2019-09-21
      schema:
        type: string
        format: date-time
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SplitListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
