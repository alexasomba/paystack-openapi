post:
  tags:
    - Subaccount
  summary: Create Subaccount
  operationId: subaccount_create
  description: Create a subacount for a partner
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SubaccountCreate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/SubaccountCreate.yaml
  responses:
    "201":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SubaccountCreateResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    default:
      description: Server error
get:
  tags:
    - Subaccount
  summary: List Subaccounts
  operationId: subaccount_list
  description: List subaccounts available on your integration
  parameters:
    - in: query
      name: perPage
      description: Number of records to fetch per request
      schema:
        type: integer
        default: 50
    - in: query
      name: page
      description: The offset to retrieve data from
      schema:
        type: integer
        default: 1
    - in: query
      name: from
      description: A timestamp from which to start listing subaccounts e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
    - in: query
      name: to
      description: A timestamp at which to stop listing subaccounts e.g. 2016-09-24T00:00:05.000Z, 2016-09-21
      schema:
        type: string
        format: date-time
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SubaccountListResponse.yaml
    "401":
      $ref: ../components/responses/Unauthorized.yaml
    "404":
      $ref: ../components/responses/NotFound.yaml
    default:
      description: Server error
