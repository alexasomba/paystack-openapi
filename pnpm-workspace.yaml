packages:
  - "."
  - "sdks/*"
allowBuilds:
  "@quobix/vacuum": true
  core-js: false
  esbuild: true
  protobufjs: true
  unrs-resolver: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
