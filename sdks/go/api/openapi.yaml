  /bank:
    get:
      description: Get a list of all supported banks and their properties
      operationId: bank_list
      parameters:
        - description: "The country from which to obtain the list of supported banks.\
            \ Accepted values are: ghana, kenya, nigeria, south africa"
          example: nigeria
          explode: true
          in: query
          name: country
          required: false
          schema:
            enum:
              - ghana
              - kenya
              - nigeria
              - south africa
            type: string
          style: form
        - description: One of the supported currency
          example: NGN
          explode: true
          in: query
          name: currency
          required: false
          schema:
            enum:
              - GHS
              - KES
              - NGN
              - ZAR
            type: string
          style: form
        - description: A flag to indicate if cursor based pagination should be used
          explode: true
          in: query
          name: use_cursor
          required: false
          schema:
            type: boolean
          style: form
        - description: "The number of objects to return per page. Defaults to 50, and\
            \ limited to 100 records per page."
          explode: true
          in: query
          name: perPage
          required: false
          schema:
            type: integer
          style: form
        - description: "Specify exactly what page you want to retrieve. If not specified,\
            \ we use a default value of 1."
          explode: true
          in: query
          name: page
          required: false
          schema:
            type: integer
          style: form
        - description: |
            An alphanumeric value returned for every cursor based retrieval, used to
            retrieve the next set of data
          explode: true
          in: query
          name: next
          required: false
          schema:
            type: string
          style: form
        - description: |
            An alphanumeric value returned for every cursor based retrieval, used to
            retrieve the previous set of data
          explode: true
          in: query
          name: previous
          required: false
          schema:
            type: string
          style: form
        - description: A flag to filter for available banks a customer can make a transfer
            to complete a payment
          explode: true
          in: query
          name: pay_with_bank_transfer
          required: false
          schema:
            type: boolean
          style: form
        - description: A flag to filter for banks a customer can pay directly from
          explode: true
          in: query
          name: pay_with_bank
          required: false
          schema:
            type: boolean
          style: form
        - description: |
            A flag to filter the banks that are supported for account verification in South Africa.
            You need to combine this with either the `currency` or `country` filter.
          explode: true
          in: query
          name: enabled_for_verification
          required: false
          schema:
            type: boolean
          style: form
        - description: The gateway type of the bank
          explode: true
          in: query
          name: gateway
          required: false
          schema:
            enum:
              - emandate
              - digitalbankmandate
            type: string
          style: form
        - description: "Type of financial channel. For Ghanaian channels, please use\
            \ either mobile_money for mobile money channels OR ghipss for bank channels"
          explode: true
          in: query
          name: type
          required: false
          schema:
            enum:
              - ghipss
              - mobile_money
              - nuban
              - kepss
              - basa
            type: string
          style: form
        - description: "A flag that returns Nigerian banks with their NIP institution\
            \ code. \nThe returned value can be used in identifying institutions on\
            \ NIP.\n"
          explode: true
          in: query
          name: include_nip_sort_code
          required: false
          schema:
            type: boolean
          style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiscellaneousListBanksResponse"
          description: Miscellaneous List Banks response
        "401":
          content:
            application/json:
              example:
                status: false
                message: Invalid key
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized operation
        "404":
          content:
            application/json:
              example:
                status: false
                message: Entity not found
              schema:
                $ref: "#/components/schemas/Error"
          description: Entity not found
        default:
          description: Server error
      summary: List Banks
      tags:
        - Bank
