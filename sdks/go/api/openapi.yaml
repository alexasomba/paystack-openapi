  schemas:
    Currency:
      description: List of all support currencies
      enum:
        - GHS
        - KES
        - NGN
        - ZAR
        - USD
        - XOF
      example: GHS
      type: string
    SplitSubaccounts:
      example:
        subaccount: ACCT_6uujpqtzmnufzkw
        share: 50
      properties:
        subaccount:
          description: Subaccount code of the customer or partner
          type: string
        share:
          description: The percentage or flat quota of the customer or partner
          type: integer
      type: object
    SplitCreate:
      description: |
        Split configuration for transactions
      example:
        name: Halfsies
        type: percentage
        currency: NGN
        subaccounts:
          - subaccount: ACCT_6uujpqtzmnufzkw
            share: 50
      properties:
        name:
          description: Name of the transaction split
          type: string
        type:
          description: The type of transaction split you want to create.
          enum:
            - percentage
            - flat
          type: string
        subaccounts:
          description: A list of object containing subaccount code and number of shares
          items:
            $ref: "#/components/schemas/SplitSubaccounts"
          type: array
        currency:
          description: The transaction currency
          enum:
            - NGN
            - GHS
            - ZAR
            - USD
            - XOF
          type: string
        bearer_type:
          description: This allows you specify how the transaction charge should be
            processed
          enum:
            - subaccount
            - account
            - all-proportional
            - all
          type: string
        bearer_subaccount:
          description: This is the subaccount code of the customer or partner that
            would bear the transaction charge if you specified subaccount as the bearer
            type
          type: string
      required:
        - currency
        - name
        - subaccounts
        - type
      type: object
    TransactionInitialize:
      description: Initialize a transaction
      example:
        email: test@demo.com
        amount: 10000
      properties:
        email:
          description: Customer's email address
          type: string
        amount:
          $ref: "#/components/schemas/TransactionInitialize_amount"
        currency:
          $ref: "#/components/schemas/Currency"
        reference:
          description: "Unique transaction reference. Only -, ., = and alphanumeric\
            \ characters allowed."
          type: string
        channels:
          description: |
            An array of payment channels to control what channels you want to make available to the user to make a payment with
          items:
            enum:
              - card
              - bank
              - ussd
              - qr
              - eft
              - mobile_money
              - bank_transfer
              - apple_pay
              - capitec_pay
              - payattitude
            type: string
          type: array
        callback_url:
          description: |
            Fully qualified url, e.g. https://example.com/ to redirect your customers to after a successful payment. Use this to override the callback url provided on the dashboard for this transaction
          type: string
        plan:
          description: "If transaction is to create a subscription to a predefined\
            \ plan, provide plan code here. \nThis would invalidate the value provided\
            \ in amount\n"
          type: string
        invoice_limit:
          description: Number of times to charge customer during subscription to plan
          type: integer
        split_code:
          description: The split code of the transaction split
          type: string
        split:
          $ref: "#/components/schemas/SplitCreate"
        subaccount:
          description: The code for the subaccount that owns the payment
          type: string
        transaction_charge:
          description: "A flat fee to charge the subaccount for a transaction. \n\
            This overrides the split percentage set when the subaccount was created\n"
          type: integer
        bearer:
          description: The bearer of the transaction charge
          enum:
            - account
            - subaccount
          type: string
        label:
          description: Used to replace the email address shown on the Checkout
          type: string
        metadata:
          $ref: "#/components/schemas/TransactionInitialize_metadata"
      required:
        - amount
        - email
      type: object
    TransactionInitializeResponse:
      example:
        data:
          reference: reference
          authorization_url: authorization_url
          access_code: access_code
        message: message
        status: true
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/TransactionInitializeResponse_data"
      required:
        - data
        - message
        - status
      type: object
    ErrorMeta:
      description: Extra details to help with a resolution of the error
      example:
        nextStep: nextStep
      properties:
        nextStep:
          description: A summarised solution for the error
          type: string
      type: object
    TransactionInitializeBadRequestModel:
      description: |
        Error response returned when a transaction is initialized with incorrect parameters
      example:
        status: false
        message: Duplicate Transaction Reference
        meta:
          nextStep: Try and create the Transaction or Charge with a new reference
        type: validation_error
        code: duplicate_reference
        errorCodeMappingNotFound: false
      properties:
        status:
          description: An indicator for the state of the request
          type: boolean
        message:
          description: A short description of the error
          type: string
        meta:
          $ref: "#/components/schemas/ErrorMeta"
        type:
          description: A tag to indicate the type of the error
          enum:
            - validation_error
            - processor_error
            - api_error
          type: string
        code:
          description: The error code
          type: string
        errorCodeMappingNotFound:
          description: An indicator for error mapping for the request
          type: boolean
      type: object
    Error:
      example:
        code: validation_error
        errorCodeMappingNotFound: true
        meta:
          nextStep: nextStep
        message: message
        type: type
        status: true
      properties:
        status:
          description: An indicator for the state of the request
          type: boolean
        message:
          description: A short description of the error
          type: string
        meta:
          $ref: "#/components/schemas/ErrorMeta"
        type:
          description: A tag to indicate the type of the error
          type: string
        code:
          description: The error code
          enum:
            - validation_error
            - processor_error
            - api_error
          type: string
        errorCodeMappingNotFound:
          description: An indicator for error mapping for the request
          type: boolean
      type: object
    TransactionChargeAuthorization:
      example:
